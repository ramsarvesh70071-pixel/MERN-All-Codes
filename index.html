<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>react-bootstrap</title>
    <link rel="Title icon" type="image/x-icon" sizes="64x64"  href="./fevicon.png" style="height: 50; width: 50;">
j
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css"
        integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
        <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css"
            integrity="sha384-AYmEC3Yw5cVb3ZcuHtOA93w35dYTsvhLPVnYs9eStHfGJvOvKxVfELGroGkvsg+p" crossorigin="anonymous"/>

            <script src="../jquery/jquery.js"></script>
            <script>
                    $(document).ready(function(){
                        $("#btnSubmit").click(function(){
                            
                            // First name empty validation
        
                            if($("#fname").val()==""){
                                alert("Please enter your first name!");
                                $("#fname").focus();
                                return false;
                            }
        
                            // First name Length validation
        
                            if($("#fname").val().length<3){
                                alert("First name must have upto minimum 3 characters!");
                                return false;
                            }
        
                            // first name numeric validation
        
                            if($.isNumeric($("#fname").val())){
                                alert("Please enter Alphanumeric or alphabatic first name!");
                                $("#fname").val('');
                                $("#fname").focus();
                                return false;
                            }
        
                            // last name empty validation
        
                            if($("#lname").val()==""){
                                alert("Please enter your last name!");
                                $("#lname").val('');
                                $("#lname").focus();
                                return false;
                            }
        
                            // First name Length validation
        
                            if($("#lname").val().length<3){
                                alert("Last name must have upto minimum 3 characters!");
                                $("#lname").val('');
                                $("#lname").focus();
                                return false;
                            }
        
                            // Last name numeric validation
        
                            if($.isNumeric($("#lname").val())){
                                alert("Please enter Alphanumeric or alphabatic last name!");
                                $("#lname").val('');
                                $("#lname").focus();
                                return false;
                            }
        
                        if(($('#email').val()=="")){
                            alert("Please Enter your Email...!");
                            $("#email").focus();
                            return false;
                        }
                        if(($('#email').val().indexOf('.')-$('#email').val().indexOf('@'))<2){
                            alert("Please Enter Valid Email...!");
                            $("#email").focus();
                            $("#email").val("");
                            return false;
                        }
                        if(($('#msg').val()=="")){
                            alert("Please Enter your message...!");
                            $("#msg").focus();
                            return false;
                        }
                        if(($('#msg').val().length<10)){
                            alert("message must be contained more then 10 character...!");
                            $("#msg").focus();
                            return false;
                        }
                        else{
                            alert("form submitted successfully");
                            return true;
                        }
        
                        });
                    });
                </script>
        

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- !-- Optional JavaScript --> -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.3/dist/umd/popper.min.js"
        integrity="sha384-ZMP7rVo3mIykV+2+9J3UJ46jBk0WLaUAdn689aCwoqbBJiSnjAK/l8WvCWPIPm49"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/js/bootstrap.min.js"
        integrity="sha384-ChfqqxuZUCnJSK3+MXmPNIyE6ZbWh2IMqE241rYiqJxyMiZ6OW/JmZQ5stwEULTy"
        crossorigin="anonymous"></script>
  </body>
</html>
